<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic-tac-toe game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="msg-container hide">
        <div class="msg">
            <h1>
                <p></p>
            </h1>
        </div>
        <button class="new-game">New Game</button>
    </div>
    <main>
        <div class="heading">
            <h1>TIC TAC TOE</h1>
        </div>
        <div class="container">
            <div class="game">



                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>

                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>


                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>

            </div>
            
        </div>
        <div class="reset-btn">
            <button class="reset">Reset game</button>
        </div>
        </main>
        <div class="info">
            <div class="name">
                <p><h2>JASMINE</h2></p>
                <p class="h"><h2>HAMZA</h2></p>
                <p class="f"><h2>FALAK</h2></p>
                <p class="m"><h2>HASAN</h2></p>
            </div>
        </div>
    <script src="script.js"></script>
</body>

</html>
