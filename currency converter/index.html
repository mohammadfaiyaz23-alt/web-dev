<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="container">
        <div class="head">
            <h1>Currency Converter</h1>
        </div>
        <div class="input">

            <div class="ueserAmount">
                <p>Enter Amount</p>
                <input type="number">
            </div>
            <div class="ExchangeAmoutn">
                <p>Exchange Amount</p>
                <output>123</output>
            </div>
        </div>
        <div class="flags">
            <div class="fromFlag">
                <img src="https://flagsapi.com/IN/flat/64.png" alt="img">
                <select class="from" name="from">
                    
                </select>
            </div>
            <div class="convert">
                <i class="fa-solid fa-arrow-right-arrow-left"></i>
            </div>
            <div class="toFlag">
                <img src="https://flagsapi.com/US/flat/64.png" alt="img">
                <select class="to" name="to">
                    
                </select>
            </div>
        </div>
        <div class="btn">
            <button>Convert Currency</button>
        </div>

    </div>
    <script src="codes.js"></script>
    <script src="script.js"></script>
</body>

</html>
