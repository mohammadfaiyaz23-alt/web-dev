<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock paper scissors-game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="heading">
            <h1><b>ROCK PAPER SCISSORS</b></h1>
        </div>
        <div class="options">
            <div id="rock" class="choice">
                <img src="image/rock.png" alt="">
            </div>
            <div id="paper" class="choice">
                <img src="image/paper.png" alt="">
            </div>
            <div id="scissors" class="choice">
                <img src="image/scissors.png" alt="">
            </div>
        </div>
        
        <div class="score">
            <div>
                <div class="user-score">0</div>
                <div><h2>YOU</h2></div>
            </div>
            <div>
                <div class="comp-score">0</div>
                <div><h2>COMPUTER</h2></div>
            </div>
        </div>
        <div class="msg">
            <div class="upper">

                <div><h2><b>YOU</b></h2></div>
                <div style="padding: 0 0 0 5rem;">
                    <h2><b>RESULT</b></h2>
                </div>
                <div><h2><b>COMPUTER</b></h2></div>
                
            </div>
            <div class="lower">

                <div class="left">
                    <div class="left-msg"></div>

                    
                </div>
                <div class="middle">
                    <div class="text">
                    </div>
                </div>
                <div class="right">
                    <div class="right-msg"></div>
                </div>
            </div>
        </div>
        <div class="last">

            <button class="btn">
                <span class="description">
                    <b>NEW GAME</b>
                </span>
                <div class="ocean"></div>
            </button>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
